<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrew Korolev — Principal Engineer</title>
    <meta name="description" content="Andrew Korolev — Principal Engineer. Terminal-style portfolio.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css?v=31">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <!-- Matrix rain canvas -->
    <canvas id="matrix-bg"></canvas>

    <!-- CRT scanlines overlay -->
    <div id="crt-scanlines"></div>

    <!-- Terminal — full screen -->
    <div id="terminal">
        <div id="terminal-body">
            <div id="output"></div>
            <div id="input-line">
                <span class="prompt" id="prompt-text"></span>
                <input type="text" id="command-input" autofocus autocomplete="off" spellcheck="false">
                <span class="cursor-blink">▌</span>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('prompt-text').innerHTML = 'visitor' + String.fromCharCode(64) + 'korolev.tech:~$&nbsp;';
    </script>
    <script src="/script.js?v=31"></script>
</body>
</html>
