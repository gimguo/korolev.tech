version: "3.8"

services:
  web:
    build: .
    container_name: korolev-tech
    restart: unless-stopped
    ports:
      - "777:80"
    environment:
      - PORT=80
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
